name: Scrape prices daily

on:
  schedule:
    # 22:17 UTC = 08:17 AEST (no DST in QLD; AEDT states will see 09:17).
    # Off-hour minute on purpose: GitHub Actions cron is congested at the top
    # of every hour and frequently delays or drops :00 / :15 / :30 / :45 runs.
    - cron: "17 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-prices
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        id: scrape
        shell: bash
        run: |
          set -o pipefail
          python -u scripts/scrape_prices.py 2>&1 | tee scrape.log

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-log-${{ github.run_id }}
          path: scrape.log
          retention-days: 30

      - name: Commit data updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/prices.json data/last_run.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): daily price scrape $(date -u +%Y-%m-%d)"
            git push
          fi
